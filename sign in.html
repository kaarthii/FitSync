<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="sign in style.css"/>
    <title>FitSync</title>
</head>
<body>
    <div class="container">
        <nav>
            <div class="nav_logo">FitSync</div>
                <div class="nav_menu">
                    <ul>
                        <li><a href="landing page.html" class="link active">Home</a></li>
                        <li><a href="#" class="link">About Us</a></li>
                        <li><a href="#" class="link">Services</a></li>
                        <li><a href="#" class="link">Contact Us</a></li>
                    </ul>
                </div>
                <div>
                    <button class="btn" id="loginBtn">Sign In</button>
                    <button class="btn" id="registerBtn" onclick="window.location.href= 'sign up.html';">Sign Up</button>
                </div>
            </div>
        </nav>
   </div>
        <div class="form_box">
            <div class="top">
                <span>Don't have an account? <a href="sign up.html" onclick="register()">Sign Up</a></span>
                <header>Sign In</header>
            </div>
        </div>
        <div class="two_forms">
            <div class="signin_container">
                <form class="input_box" action="signin.php" method="POST">
                    <input type="text" name="email" class="input_field" placeholder="Username or Email">
                    <i class="bx bx_envelope"></i><br>
                    <input type="password" name="password" class="input_field" placeholder="Password">
                    <i class="bx bx_lock_alt"></i><br>
                    <button name="submit" type="submit" class="submit">Sign In</button>
                    <div class="two_col">
                        <div class="one">
                            <input type="checkbox" class="signin_check">
                            <label for="signin_check">Remember Me</label>
                        </div>
                        <div class="two">
                            <label><a href="#">Forgot password?</a></label>
                        </div>
                    </div>
                </form>

            </div>
        </div>
   </div>
</body>
</html>
