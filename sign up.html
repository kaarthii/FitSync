<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="sign up styles.css"/>
    <title>FitSync</title>
</head>
<body>
    <div class="container">
        <nav>
            <div class="nav_logo">FitSync</div>
                <div class="nav_menu">
                    <ul>
                        <li><a href="landing page.html" class="link active">Home</a></li>
                        <li><a href="#" class="link">About Us</a></li>
                        <li><a href="#" class="link">Services</a></li>
                        <li><a href="#" class="link">Contact Us</a></li>
                    </ul>
                </div>
                <div>
                    <button class="btn" id="loginBtn" onclick="window.location.href='sign in.html';">Sign In</button>
                    <button class="btn" id="registerBtn">Sign Up</button>
                </div>
            </div>
        </nav>
   </div>
        <div class="form_box">
            <div class="top">
                <span>Have an account? <a href="sign in.html" onclick="login()">Sign in</a></span>
                <header>Sign Up</header>
            </div>
        </div>
            <div class="two_forms">
                <div class="register_container">
                    <form class="input_box" action="signup.php" method="post">
                        <input type="text" class="input_field" name="fname" placeholder="First Name">
                        <i class="bx bx_user"></i><br>
                        <input type="text" class="input_field" name="lname" placeholder="Last Name">
                        <i class="bx bx_user"></i><br>
                        <input type="text" class="input_field" name="email" placeholder="Email">
                        <i class="bx bx_envelope"></i><br>
                        <input type="password" class="input_field" name="password" placeholder="Password">
                        <i class="bx bx_lock_alt"></i><br>
                        <input type="password" class="input_field" name="confirm_password" placeholder="Confirm password">
                        <i class="bx bx_lock_alt"></i><br>
                        <button type="submit" class="submit" name="submit">Register</button>
                        <div class="two_col">
                            <div class="one">
                                <input type="checkbox" class="register_check">
                                <label for="register_check">Remember Me</label>
                            </div>
                             <div class="two">
                                <label><a href="#">Terms & conditions</a></label>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
</body>
